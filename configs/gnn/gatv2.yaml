# GATv2 Configuration
# Task: BCE binary classification — label = (H_final > 0.5) per node
# ─────────────────────────────────────────────────────────────────────
# WHY BCE CLASSIFICATION (v3):
#   Regression on H_final (v2) caused output collapse to mean (std=0.054).
#   Binary classification with positive_weight=5.0 on the 5.5:1 imbalance
#   (H_final > 0.5 labels, ~15.5% positive) converged cleanly.
#
# INFERENCE THRESHOLD (empirically determined via threshold sweep):
#   t=0.70 → F1=0.5385, Recall=0.536, Precision=0.541, Flagged=15.3%
#   This is the natural calibration point: flagged% ≈ true positive rate.
#   Use this threshold in pipeline.py and evaluate_ai4mars.py.
# ─────────────────────────────────────────────────────────────────────

model:
  name: "gatv2"
  
  # Layer 1: GATv2Conv(14→32, 4 heads, concat=True → 128)
  layer1:
    in_channels: 14
    out_channels: 32
    heads: 4
    concat: true           # Output: 32*4 = 128
    dropout: 0.3
    activation: "elu"
  
  # Layer 2: GATv2Conv(128→32, 4 heads, concat=False → 32)
  layer2:
    in_channels: 128
    out_channels: 32
    heads: 4
    concat: false          # Output: 32 (average of heads)
    dropout: 0.2
    activation: "elu"
  
  # Output head: Linear(32→1) → Sigmoid
  # Sigmoid naturally bounds output to [0,1], matching H_final target range
  output:
    in_features: 32
    out_features: 1
    activation: "sigmoid"

training:
  optimizer: "adam"
  learning_rate: 1.0e-3
  weight_decay: 5.0e-4
  
  epochs: 100
  early_stopping:
    enabled: true
    patience: 15
    monitor: "val_hazard_recall"  # H_final-derived recall
    mode: "max"
  
  loss:
    type: "bce"              # Binary cross-entropy (H_final > 0.5 labels)
    positive_weight: 5.0     # 5.5:1 imbalance → weight=5 (vs 47:1 before)
  
  # Weak labeling: propagate hazard label to 2-hop neighbours of confirmed hazards.
  # Blueprint §7.7.3: required. Re-enabled after M1 audit finding.
  weak_labeling:
    enabled: true
    hops: 2
    label_value: 0.8       # Soft label for weak neighbours (vs 1.0 for confirmed)

graph:
  # SLIC superpixel parameters
  slic:
    n_segments: 300
    compactness: 10.0
    sigma: 1.0

  # Node deactivation threshold (inference / A* path planning)
  # Nodes with mean(H_final) > 0.7 become virtual obstacle nodes in graph construction.
  hazard_threshold: 0.7

  # GATv2 inference decision threshold (empirically set via threshold sweep on val set)
  # t=0.70 → best F1=0.5385, Recall=0.536, Precision=0.541, Flagged=15.3%
  # (true hazard rate is 15.5% — near-perfect calibration)
  inference_threshold: 0.70

  # A* deactivation: nodes with GATv2 risk > (1 - deactivation_threshold) are blocked.
  # deactivation_threshold=0.30 → blocks nodes with risk > 0.70  (matches inference_threshold)
  # Previously 0.20 → blocked only risk > 0.80 (too permissive given t=0.70 calibration)
  deactivation_threshold: 0.30

  # Edge weight formula: w(u,v) = α·avg_risk + β·norm_dist + γ·|slope_u - slope_v|
  edge_weights:
    alpha_w: 0.6           # Risk weight
    beta_w: 0.25           # Distance weight
    gamma_w: 0.15          # Slope discontinuity weight
